<!DOCTYPE html>
<html>
<head>
    <title>Belajar Box CSS</title>
    <style>
        /* Ini adalah bagian CSS untuk menghias kotak */
        .kotak-profil {
            background-color: rgb(47, 146, 180); /* Warna latar */
            width: 500px;               /* Lebar kotak */
            padding: 20px;              /* Jarak di dalam kotak */
            border: 5px solid rgb(0, 0, 0);     /* Garis pinggir */
            border-radius: 15px;        /* Membuat sudut melengkung */
            text-align: center;         /* Teks di tengah */
            margin: 50px auto;          /* Kotak berada di tengah halaman */
            font-family: sans-serif;
        }

        .foto-dummy {
            object-fit: cover;
            background-color: white;
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            border-radius: 50%;         /* Membuat lingkaran */
            line-height: 100px;         /* Agar teks di tengah lingkaran */
        }

        img {
          width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            border-radius: 50%;         /* Membuat lingkaran */
            line-height: 100px;    
        }
    </style>
</head>
<body>

    <div class="kotak-profil">
        <div class="foto-dummy"><img src="https://images.pexels.com/photos/20457106/pexels-photo-20457106.jpeg"></div>
        <h1>Rakazgtw</h1>
        <p>seorang yg
             pintar</p>
        <button>Kenali Saya</button>
    </div>

</body>
</html>
